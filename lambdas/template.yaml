AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  citas-app — Backend serverless mejorado:
  API Gateway HTTP + 3 Lambdas + 2 tablas DynamoDB.
  Optimizado para Free Tier de AWS.

# ─── Globals ──────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.11 # Versión LTS más reciente
    Timeout: 29
    MemorySize: 128 # 128 MB es suficiente para operaciones DynamoDB simples
    Tracing: Active # X-Ray activo
    Environment:
      Variables:
        TABLE_NAME: !Ref PlanesTable
        CITAS_TABLE_NAME: !Ref CitasTable
        POWERTOOLS_LOG_LEVEL: INFO
    Layers:
      - !Ref CommonLayer

# ─── Recursos ──────────────────────────────────────────────────────────────────
Resources:
  # ── Capa compartida (utils.py) ─────────────────────────────────────────────
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "citas-common"
      ContentUri: layers/baselayer/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete

  # ── API Gateway HTTP API ───────────────────────────────────────────────────
  # HTTP API es ~70% más barato que REST API y suficiente para este caso
  CitasApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Api-Key
      # Opcional: habilitar API Key para proteger endpoints
      # Auth:
      #   DefaultAuthorizer: ApiKeyAuthorizer
      #   Authorizers:
      #     ApiKeyAuthorizer:
      #       ...

  # ── Lambda: Planes CRUD ────────────────────────────────────────────────────
  PlanesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "planes-crud"
      CodeUri: functions/DatesCRUD/
      Handler: handler.lambda_handler
      Description: "CRUD de Planes turísticos/actividades"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlanesTable
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /planes
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /planes/{nombre}
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /planes
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PUT
            Path: /planes/{nombre}
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: DELETE
            Path: /planes/{nombre}
        ResetRatings:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PATCH
            Path: /planes/reset-ratings

  # ── Lambda: Citas CRUD ─────────────────────────────────────────────────────
  CitasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "citas-crud"
      CodeUri: functions/CitasCRUD/
      Handler: handler.lambda_handler
      Description: "CRUD de Citas (agenda de actividades)"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CitasTable
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /citas
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /citas/{id}
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /citas
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PUT
            Path: /citas/{id}
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: DELETE
            Path: /citas/{id}

  # ── Lambda: Random Plan ────────────────────────────────────────────────────
  RandomPlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "random-plan"
      CodeUri: functions/RandomDates/
      Handler: handler.lambda_handler
      Description: "Genera un Plan aleatorio y una Cita sugerida"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PlanesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CitasTable
      Events:
        GetRandom:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: planes/_random

  # ── DynamoDB: Tabla Citas ──────────────────────────────────────────────────
  CitasTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Citas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: estado
          AttributeType: S
        - AttributeName: fecha
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      # GSI para buscar citas por estado (ej: todas las pendientes)
      GlobalSecondaryIndexes:
        - IndexName: estado-fecha-index
          KeySchema:
            - AttributeName: estado
              KeyType: HASH
            - AttributeName: fecha
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: citas-app
  PlanesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: Planes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: nombre
          AttributeType: S
      KeySchema:
        - AttributeName: nombre
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: citas-app

# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: "URL base de la API"
    Value: !Sub "https://${CitasApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "CitasApiUrl"

  CitasTableName:
    Description: "Nombre de la tabla Citas"
    Value: !Ref CitasTable
  PlanesTableName:
    Description: "Nombre de la tabla Planes"
    Value: !Ref PlanesTable
