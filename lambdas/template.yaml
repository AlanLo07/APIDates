AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  citas-app — Backend serverless mejorado:
  API Gateway HTTP + 4 Lambdas + 3 tablas DynamoDB.
  Optimizado para Free Tier de AWS.

Parameters:
  PlanesTableName:
    Type: String
    Default: Planes
    Description: "Nombre de la tabla Planes ya existente"
  CitasTableName:
    Type: String
    Default: Citas
    Description: "Nombre de la tabla Citas ya existente"

# ─── Globals ──────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.11
    Timeout: 29
    MemorySize: 128
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref PlanesTableName
        CITAS_TABLE_NAME: !Ref CitasTableName
        LOVE_PHRASES_TABLE_NAME: !Ref LovePhrasesTable
        POWERTOOLS_LOG_LEVEL: INFO
    Layers:
      - !Ref CommonLayer

# ─── Recursos ──────────────────────────────────────────────────────────────────
Resources:
  # ── Capa compartida (utils.py) ─────────────────────────────────────────────
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: citas-common
      ContentUri: layers/baselayer/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete

  # ── API Gateway HTTP API ───────────────────────────────────────────────────
  CitasApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Api-Key

  # ── Lambda: Planes CRUD ────────────────────────────────────────────────────
  PlanesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: planes-crud
      CodeUri: functions/DatesCRUD/
      Handler: handler.lambda_handler
      Description: "CRUD de Planes turísticos/actividades"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlanesTableName
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /planes
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /planes/{nombre}
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /planes
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PUT
            Path: /planes/{nombre}
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: DELETE
            Path: /planes/{nombre}
        ResetRatings:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PATCH
            Path: /planes/reset-ratings

  # ── Lambda: Citas CRUD ─────────────────────────────────────────────────────
  CitasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: citas-crud
      CodeUri: functions/CitasCRUD/
      Handler: handler.lambda_handler
      Description: "CRUD de Citas (agenda de actividades)"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CitasTableName
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /citas
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /citas/{id}
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /citas
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PUT
            Path: /citas/{id}
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: DELETE
            Path: /citas/{id}

  # ── Lambda: Random Plan ────────────────────────────────────────────────────
  RandomPlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: random-plan
      CodeUri: functions/RandomDates/
      Handler: handler.lambda_handler
      Description: "Genera un Plan aleatorio y una Cita sugerida"
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PlanesTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref CitasTableName
      Events:
        GetRandom:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /planes/_random

  # ── Lambda: Love Phrases CRUD ──────────────────────────────────────────────
  LovePhrasesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: love-phrases-crud
      CodeUri: functions/PhrasesCRUD/
      Handler: handler.lambda_handler
      Description: "CRUD de Frases de Amor para el juego del ahorcado"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LovePhrasesTable
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /love-phrases
        GetRandom:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /love-phrases/random
        GetOne:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: GET
            Path: /love-phrases/{id}
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: POST
            Path: /love-phrases
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: PUT
            Path: /love-phrases/{id}
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref CitasApi
            Method: DELETE
            Path: /love-phrases/{id}

  # ── DynamoDB: Tabla Love Phrases ───────────────────────────────────────────
  LovePhrasesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: LovePhrases
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      # GSI para filtrar por tipo (cancion, pelicula, libro, serie, pareja)
      GlobalSecondaryIndexes:
        - IndexName: type-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: citas-app

# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: "URL base de la API"
    Value: !Sub "https://${CitasApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "CitasApiUrl"

  LovePhrasesTableName:
    Description: "Nombre de la tabla LovePhrases"
    Value: !Ref LovePhrasesTable

  LovePhrasesEndpoint:
    Description: "Endpoint de Love Phrases"
    Value: !Sub "https://${CitasApi}.execute-api.${AWS::Region}.amazonaws.com/love-phrases"
