AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "citas-app \u2014 Backend serverless mejorado: API Gateway HTTP + 3 Lambdas\
  \ + 2 tablas DynamoDB. Optimizado para Free Tier de AWS.\n"
Globals:
  Function:
    Runtime: python3.11
    Timeout: 29
    MemorySize: 128
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: Planes
        CITAS_TABLE_NAME:
          Ref: CitasTable
        POWERTOOLS_LOG_LEVEL: INFO
    Layers:
    - Ref: CommonLayer
Resources:
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName:
        Fn::Sub: citas-common
      ContentUri: ..\..\common
      CompatibleRuntimes:
      - python3.11
      RetentionPolicy: Delete
  CitasApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - X-Api-Key
  PlanesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: planes-crud
      CodeUri: PlanesFunction
      Handler: handler.lambda_handler
      Description: "CRUD de Planes tur\xEDsticos/actividades"
      Policies:
      - DynamoDBCrudPolicy:
          TableName: Planes
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: GET
            Path: /planes
        GetOne:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: GET
            Path: /planes/{id}
        Create:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: POST
            Path: /planes
        Update:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: PUT
            Path: /planes/{id}
        Delete:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: DELETE
            Path: /planes/{id}
        ResetRatings:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: PATCH
            Path: /planes/reset-ratings
    Metadata:
      SamResourceId: PlanesFunction
  CitasFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: citas-crud
      CodeUri: CitasFunction
      Handler: handler.lambda_handler
      Description: CRUD de Citas (agenda de actividades)
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CitasTable
      Events:
        GetAll:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: GET
            Path: /citas
        GetOne:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: GET
            Path: /citas/{id}
        Create:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: POST
            Path: /citas
        Update:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: PUT
            Path: /citas/{id}
        Delete:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: DELETE
            Path: /citas/{id}
    Metadata:
      SamResourceId: CitasFunction
  RandomPlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: random-plan
      CodeUri: RandomPlanFunction
      Handler: handler.lambda_handler
      Description: Genera un Plan aleatorio y una Cita sugerida
      Policies:
      - DynamoDBReadPolicy:
          TableName: Planes
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CitasTable
      Events:
        GetRandom:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: CitasApi
            Method: GET
            Path: /random
    Metadata:
      SamResourceId: RandomPlanFunction
  CitasTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName:
        Fn::Sub: Citas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: estado
        AttributeType: S
      - AttributeName: fecha
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: estado-fecha-index
        KeySchema:
        - AttributeName: estado
          KeyType: HASH
        - AttributeName: fecha
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: citas-app
Outputs:
  ApiUrl:
    Description: URL base de la API
    Value:
      Fn::Sub: https://${CitasApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name:
        Fn::Sub: CitasApiUrl
  CitasTableName:
    Description: Nombre de la tabla Citas
    Value:
      Ref: CitasTable
